name: Publish package

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      # Optional but recommended: run --check on every entry point as a
      # cheap smoke test before publishing anything. Doesn't hit the
      # network, just confirms nothing is syntactically broken.
      - run: |
          node --check rdd-core.mjs
          node --check rdd-download.mjs
          node --check rdd-download-live.mjs
          node --check rdd-studio.static-tables.mjs

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://npm.pkg.github.com"
          # Defaults to the account that owns this workflow file
          scope: "@${{ github.repository_owner }}"

      - run: npm ci

      # GitHub Packages requires the package name to be scoped under the
      # owner/org that owns the repo (e.g. @your-org/roblox-rdd-downloader).
      # This renames it just for this job's publish step — it doesn't
      # touch the committed package.json, so the public npm package keeps
      # its unscoped name.
      - run: npm pkg set name="@${{ github.repository_owner }}/roblox-rdd-downloader"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
